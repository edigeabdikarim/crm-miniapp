<!doctype html>
<html>
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>CRM Dashboard MVP</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    body { font-family: system-ui, -apple-system, Arial; margin: 16px; }
    h2 { margin: 0 0 12px; }
    .row { display:flex; gap:10px; margin-bottom:12px; flex-wrap: wrap; }
    button { padding:10px 12px; border-radius:10px; border:1px solid #e5e7eb; background:#fff; cursor:pointer; }
    button.active { border-color:#111827; font-weight:700; }
    .meta { font-size: 12px; opacity: .7; margin: 6px 0 12px; }
    .grid { display:grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 12px; }
    .card { border:1px solid #e5e7eb; border-radius:12px; padding:12px; }
    .k { font-size: 12px; opacity: .65; }
    .v { font-size: 22px; font-weight: 700; margin-top: 6px; }
  </style>
</head>
<body>
  <h2>CRM Dashboard (MVP)</h2>

  <div class="row">
    <button id="btn-day" onclick="load('day')">День</button>
    <button id="btn-week" onclick="load('week')">Неделя</button>
    <button id="btn-month" onclick="load('month')">Месяц</button>
  </div>

  <div id="meta" class="meta">—</div>
  <div class="grid" id="grid"></div>

  <script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbz1oR97zOM8_Rwexewxuw9W9ZLob4s-xb8vAWCSMBy8q6mraxuZRaAwydpKQTA-Rtm4/exec";

    function setActive(period){
      ["day","week","month"].forEach(p=>{
        const el = document.getElementById("btn-"+p);
        if (!el) return;
        el.classList.toggle("active", p===period);
      });
    }

    function num(d, key, fallback = 0) {
      const v = d?.[key];
      if (v === undefined || v === null || v === "") return fallback;
      if (typeof v === "number") return v;
      const n = Number(String(v).replace(",", "."));
      return Number.isFinite(n) ? n : fallback;
    }

    function asInt(v){ return Math.round(v); }

    function asPct01(v){ // 0.2 -> "20%"
      const p = Math.round(v * 1000) / 10; // 1 знак
      return `${p}%`;
    }

    function formatReportDate(iso){
      if (!iso) return "—";
      const dt = new Date(iso);
      // покажем как локальную дату пользователя
      return dt.toLocaleString(undefined, { year:"numeric", month:"2-digit", day:"2-digit" });
    }

    async function load(period) {
      setActive(period);

      const meta = document.getElementById('meta');
      meta.textContent = `Загрузка: ${period}...`;

      const res = await fetch(`${GAS_URL}?period=${period}`, { cache: "no-store" });
      const text = await res.text();

      let json;
      try { json = JSON.parse(text); }
      catch (e) {
        meta.textContent = `Ошибка: ответ не JSON. Открой GAS URL и пришли первые строки ответа.`;
        console.log("RAW RESPONSE:", text);
        return;
      }

      const d = json.data ?? json;

      const updatedAt = new Date().toLocaleString(undefined, { hour:"2-digit", minute:"2-digit", day:"2-digit", month:"2-digit" });
      const reportDate = formatReportDate(d["Дата"]);

      meta.textContent = `Период: ${period === "day" ? "День" : period === "week" ? "Неделя" : "Месяц"} • Отчетная дата: ${reportDate} • Обновлено: ${updatedAt}`;

      // KPI под твои реальные ключи
      const incoming = num(d, "Итого входящие");
      const closed   = num(d, "Итого закрыто");
      const success  = num(d, "Успешно реализовано");
      const waiting  = num(d, "Переведено в ожидание ответа");
      const reserve  = num(d, "Переведено в оффлайн/резерв");
      const convCls  = num(d, "Конверсия в закрытие"); // 0..1
      const shareNew = num(d, "Доля новых");          // 0..1
      const shareRet = num(d, "Доля возвратных");     // 0..1

      const kpis = [
        ["Входящие", asInt(incoming)],
        ["Закрыто (итого)", asInt(closed)],
        ["Успешно реализовано", asInt(success)],
        ["Ожидание ответа", asInt(waiting)],
        ["В резерв/оффлайн", asInt(reserve)],
        ["Конверсия в закрытие", asPct01(convCls)],
        ["Доля новых", asPct01(shareNew)],
        ["Доля возвратных", asPct01(shareRet)],
      ];

      const grid = document.getElementById('grid');
      grid.innerHTML = "";
      for (const [k, v] of kpis) {
        const el = document.createElement('div');
        el.className = "card";
        el.innerHTML = `<div class="k">${k}</div><div class="v">${v}</div>`;
        grid.appendChild(el);
      }

      if (window.Telegram?.WebApp) Telegram.WebApp.expand();
    }

    load('day');
  </script>
</body>
</html>
