<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Bugatti CRM — Планы продаж</title>

  <!-- Telegram WebApp API -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <style>
    :root{
      --bg0:#050914;
      --bg1:#0a1130;
      --card:#0b1633cc;
      --card2:#0a142ee6;
      --stroke:rgba(255,255,255,.08);
      --stroke2:rgba(255,255,255,.12);
      --text:#eaf0ff;
      --muted:rgba(234,240,255,.62);
      --muted2:rgba(234,240,255,.45);
      --brand:#4aa3ff;
      --good:#22c55e;
      --warn:#f59e0b;
      --bad:#ef4444;

      --shadow: 0 18px 60px rgba(0,0,0,.55);
      --radius: 20px;
      --radius2: 16px;
    }

    *{ box-sizing:border-box; }
    html,body{ height:100%; }
    body{
      margin:0;
      color:var(--text);
      font: 14px/1.35 system-ui, -apple-system, Segoe UI, Roboto, Arial, "Apple Color Emoji","Segoe UI Emoji";
      background:
        radial-gradient(1200px 700px at 18% 8%, rgba(96,165,250,.22), transparent 60%),
        radial-gradient(900px 600px at 85% 18%, rgba(168,85,247,.20), transparent 60%),
        radial-gradient(800px 600px at 50% 95%, rgba(34,197,94,.10), transparent 60%),
        linear-gradient(180deg, var(--bg0), var(--bg1));
      overflow:hidden;                 /* важное: страница не скроллится */
      overscroll-behavior: none;       /* iOS "резинка" меньше влияет */
    }

    /* Layout */
    .wrap{
      height:100%;
      display:flex;
      flex-direction:column;
      gap:14px;
      padding: 18px 16px calc(18px + env(safe-area-inset-bottom));
    }

    header{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:12px;
    }

    .title{
      display:flex;
      flex-direction:column;
      gap:6px;
      min-width:0;
    }

    .title h1{
      margin:0;
      font-size:22px;
      letter-spacing:.2px;
    }
    .subtitle{
      color:var(--muted);
      font-size:12.5px;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      max-width: 100%;
    }

    .pill{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:10px 12px;
      border-radius: 999px;
      background: rgba(255,255,255,.04);
      border:1px solid var(--stroke);
      backdrop-filter: blur(10px);
      box-shadow: 0 10px 30px rgba(0,0,0,.25);
      user-select:none;
      white-space:nowrap;
    }
    .dot{
      width:9px;height:9px;border-radius:50%;
      background: rgba(255,255,255,.35);
      box-shadow: 0 0 0 3px rgba(255,255,255,.06);
    }
    .dot.ok{ background: var(--good); box-shadow:0 0 0 3px rgba(34,197,94,.18); }

    /* Controls */
    .controls{
      display:flex;
      gap:10px;
      padding:12px;
      border-radius: var(--radius);
      background: rgba(255,255,255,.04);
      border:1px solid var(--stroke);
      backdrop-filter: blur(10px);
      box-shadow: var(--shadow);
      flex-wrap:wrap;
    }
    .select{
      flex:1 1 160px;
      min-width: 120px;
      position:relative;
    }
    select{
      width:100%;
      appearance:none;
      -webkit-appearance:none;
      border:1px solid var(--stroke2);
      outline:none;
      color:var(--text);
      background: rgba(0,0,0,.22);
      padding:12px 40px 12px 14px;
      border-radius: 999px;
      font-size:14px;
    }
    .select:after{
      content:"▾";
      position:absolute;
      right:14px;
      top:50%;
      transform: translateY(-50%);
      color: var(--muted);
      pointer-events:none;
      font-size:14px;
    }

    button{
      border:1px solid rgba(74,163,255,.35);
      background: rgba(74,163,255,.14);
      color: var(--text);
      padding: 12px 14px;
      border-radius: 999px;
      cursor:pointer;
      user-select:none;
      white-space:nowrap;
    }
    button:active{ transform: translateY(1px); }

    /* Main content area (scrollable only inside) */
    .content{
      flex:1;
      min-height:0; /* важно для внутренних скроллов */
      display:flex;
      flex-direction:column;
      gap:14px;
    }

    /* Cards */
    .grid{
      display:grid;
      grid-template-columns: repeat(4, minmax(0,1fr));
      gap:12px;
    }
    @media (max-width: 980px){
      .grid{ grid-template-columns: repeat(2, minmax(0,1fr)); }
    }

    .card{
      border-radius: var(--radius);
      background: linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.03));
      border:1px solid var(--stroke);
      backdrop-filter: blur(14px);
      box-shadow: var(--shadow);
      padding:14px 14px 12px;
      min-height: 84px;
      display:flex;
      flex-direction:column;
      justify-content:space-between;
      gap:6px;
    }
    .card .k{ color:var(--muted); font-size:12px; }
    .card .v{
      font-size:28px;
      font-weight: 750;
      letter-spacing:.3px;
    }
    .card .s{ color:var(--muted2); font-size:12px; }

    /* Table block */
    .block{
      border-radius: var(--radius);
      background: linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.02));
      border:1px solid var(--stroke);
      backdrop-filter: blur(14px);
      box-shadow: var(--shadow);
      padding: 12px;
      display:flex;
      flex-direction:column;
      gap:10px;
      min-height: 0;
    }
    .block h2{
      margin:0;
      font-size: 15px;
      letter-spacing:.2px;
    }

    /* Scroll wrapper for tables */
    .scrollX{
      overflow:auto;                      /* горизонт + вертик */
      -webkit-overflow-scrolling: touch;  /* iOS smooth */
      overscroll-behavior: contain;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,.06);
      background: rgba(0,0,0,.18);
    }

    table{
      width:100%;
      border-collapse:separate;
      border-spacing:0;
      min-width: 680px; /* чтобы на телефоне был горизонтальный скролл, а не "уезд" */
      font-size: 13px;
    }
    thead th{
      position: sticky;
      top: 0;
      z-index: 2;
      background: rgba(10,20,46,.92);
      backdrop-filter: blur(10px);
      color: var(--muted);
      text-align:left;
      padding: 10px 12px;
      border-bottom: 1px solid rgba(255,255,255,.08);
      font-weight: 650;
    }
    tbody td{
      padding: 10px 12px;
      border-bottom: 1px solid rgba(255,255,255,.06);
      white-space:nowrap;
    }
    tbody tr:hover td{ background: rgba(255,255,255,.03); }

    .right{ text-align:right; }
    .mono{ font-variant-numeric: tabular-nums; }

    /* Percent badge */
    .pct{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-width:64px;
      padding: 6px 10px;
      border-radius: 999px;
      border:1px solid rgba(255,255,255,.10);
      font-weight: 750;
      letter-spacing:.2px;
    }
    .pct.bad { color: #ffd1d1; background: rgba(239,68,68,.14); border-color: rgba(239,68,68,.35); }
    .pct.warn{ color: #ffe7c2; background: rgba(245,158,11,.14); border-color: rgba(245,158,11,.35); }
    .pct.good{ color: #c8ffe1; background: rgba(34,197,94,.14); border-color: rgba(34,197,94,.35); }

    .muted{ color: var(--muted); }

    /* Small helper row */
    .row{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      flex-wrap:wrap;
      color: var(--muted);
      font-size: 12px;
    }

    /* Compact date for mobile table */
    .col-date{ width: 80px; }
    .col-dow { width: 60px; }

    /* Hide ugly scrollbar (optional) */
    .scrollX::-webkit-scrollbar{ height: 10px; width: 10px; }
    .scrollX::-webkit-scrollbar-thumb{
      background: rgba(255,255,255,.14);
      border-radius: 999px;
    }
    .scrollX::-webkit-scrollbar-track{ background: rgba(255,255,255,.05); }
  </style>
</head>

<body>
  <div class="wrap">
    <header>
      <div class="title">
        <h1>Планы продаж</h1>
        <div class="subtitle" id="subtitle">Загрузка…</div>
      </div>
      <div class="pill" id="statusPill">
        <span class="dot" id="statusDot"></span>
        <span id="statusText">GAS · …</span>
      </div>
    </header>

    <div class="controls">
      <div class="select"><select id="yearSel"></select></div>
      <div class="select"><select id="monthSel"></select></div>
      <div class="select"><select id="storeSel"></select></div>
      <button id="refreshBtn">Обновить</button>
    </div>

    <div class="content">
      <div class="grid" id="cards"></div>

      <div class="block">
        <h2>Ежедневные данные</h2>
        <div class="row">
          <span class="muted" id="dailyHint">Даты выбранного месяца</span>
          <span class="muted" id="dailyCut">Срез: —</span>
        </div>

        <div class="scrollX">
          <table id="dailyTable">
            <thead>
              <tr>
                <th class="col-date">Дата</th>
                <th class="col-dow">День</th>
                <th class="right">План</th>
                <th class="right">Факт</th>
                <th class="right">% от плана</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <script>
    /***********************
     * Telegram “anti-collapse”
     ***********************/
    (function(){
      const tg = window.Telegram?.WebApp;
      if (!tg) return;

      tg.ready();
      tg.expand();

      // не везде поддерживается, но где есть — сильно помогает
      tg.disableVerticalSwipes?.();

      // опционально: подтверждение закрытия (можешь отключить)
      // tg.enableClosingConfirmation?.();
    })();

    /***********************
     * CONFIG
     ***********************/
    const GAS_URL = "https://script.google.com/macros/s/AKfycbyY-XfXyJTuEvWWnX_PJiXUqYoS3ZhlI02jRARqStL_AftqMxUcHt4l4GcqKH9sKttP/exec"; // <-- ВСТАВЬ СЮДА СВОЙ GAS /exec

    // Месяцы (RU)
    const MONTHS_RU = ["Январь","Февраль","Март","Апрель","Май","Июнь","Июль","Август","Сентябрь","Октябрь","Ноябрь","Декабрь"];
    const DOW_SHORT = ["Вс","Пн","Вт","Ср","Чт","Пт","Сб"];

    /***********************
     * Helpers
     ***********************/
    const $ = (id) => document.getElementById(id);

    function setStatus(ok, text){
      $("statusText").textContent = text;
      const dot = $("statusDot");
      dot.classList.toggle("ok", !!ok);
    }

    function fmtMoney(n){
      if (n === null || n === undefined || isNaN(n)) return "—";
      const v = Math.round(Number(n));
      return v.toLocaleString("ru-RU") + " ₸";
    }
    function fmtInt(n){
      if (n === null || n === undefined || isNaN(n)) return "—";
      return Math.round(Number(n)).toLocaleString("ru-RU");
    }
    function fmtPct(p){
      if (p === null || p === undefined || isNaN(p)) return "—";
      return (Number(p) * 100).toFixed(1) + "%";
    }

    function pctClass(p){
      // p is fraction (0..)
      if (p === null || p === undefined || isNaN(p)) return "bad";
      const x = Number(p) * 100;
      if (x < 80) return "bad";
      if (x <= 100) return "warn";
      return "good";
    }

    function parseISODateOnly(s){
      // s может быть "2026-02-28T19:00:00.000Z" или "2026-02-28"
      if (!s) return null;
      const m = String(s).match(/^(\d{4})-(\d{2})-(\d{2})/);
      if (!m) return null;
      const y = Number(m[1]), mo = Number(m[2]), d = Number(m[3]);
      // Создаем дату в UTC, чтобы не было сдвига дней на таймзоне
      return new Date(Date.UTC(y, mo - 1, d));
    }

    function ymdUTC(dt){
      const y = dt.getUTCFullYear();
      const m = String(dt.getUTCMonth()+1).padStart(2,"0");
      const d = String(dt.getUTCDate()).padStart(2,"0");
      return `${y}-${m}-${d}`;
    }

    function ddmm(dt){
      const d = String(dt.getUTCDate()).padStart(2,"0");
      const m = String(dt.getUTCMonth()+1).padStart(2,"0");
      return `${d}.${m}`;
    }

    function dowShort(dt){
      return DOW_SHORT[dt.getUTCDay()];
    }

    function daysInMonthUTC(year, monthIndex0){
      // monthIndex0: 0..11
      return new Date(Date.UTC(year, monthIndex0 + 1, 0)).getUTCDate();
    }

    function buildMonthDatesUTC(year, monthIndex0){
      const n = daysInMonthUTC(year, monthIndex0);
      const out = [];
      for (let d=1; d<=n; d++){
        out.push(new Date(Date.UTC(year, monthIndex0, d)));
      }
      return out;
    }

    async function fetchJSON(url){
      const res = await fetch(url, { cache: "no-store" });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      return res.json();
    }

    function qs(obj){
      const u = new URL(GAS_URL);
      for (const [k,v] of Object.entries(obj)) u.searchParams.set(k, v);
      return u.toString();
    }

    /***********************
     * Data state
     ***********************/
    let META = null;
    let RAW = null;
    let PLANS = null;

    /***********************
     * Loaders
     ***********************/
    async function loadAll(){
      setStatus(false, "GAS · загрузка…");
      try{
        META  = await fetchJSON(qs({ entity: "meta"  }));
        RAW   = await fetchJSON(qs({ entity: "raw"   }));
        PLANS = await fetchJSON(qs({ entity: "plans" }));

        setStatus(true, "GAS · OK");

        initSelectorsFromMeta();
        render();
      }catch(e){
        console.error(e);
        setStatus(false, "GAS · ERROR");
        $("subtitle").textContent = "Ошибка загрузки данных. Проверь GAS URL и доступ.";
      }
    }

    function initSelectorsFromMeta(){
      // year list
      const years = (META?.years || []).slice().sort((a,b)=>b-a);
      const stores = (META?.stores || []).slice().sort((a,b)=>String(a).localeCompare(String(b),"ru"));

      const yearSel = $("yearSel");
      yearSel.innerHTML = years.map(y=>`<option value="${y}">${y}</option>`).join("");

      const monthSel = $("monthSel");
      monthSel.innerHTML = MONTHS_RU.map(m=>`<option value="${m}">${m}</option>`).join("");

      const storeSel = $("storeSel");
      storeSel.innerHTML = stores.map(s=>`<option value="${escapeHtml(s)}">${escapeHtml(s)}</option>`).join("");

      // defaults
      const now = new Date();
      const yNow = now.getFullYear();
      const mNow = MONTHS_RU[now.getMonth()];

      if (years.includes(yNow)) yearSel.value = String(yNow);
      monthSel.value = mNow;
      if (stores.includes("Астана")) storeSel.value = "Астана";
    }

    function escapeHtml(s){
      return String(s)
        .replaceAll("&","&amp;")
        .replaceAll("<","&lt;")
        .replaceAll(">","&gt;")
        .replaceAll('"',"&quot;")
        .replaceAll("'","&#039;");
    }

    /***********************
     * Core calculations
     ***********************/
    function getSelection(){
      const year = Number($("yearSel").value);
      const month = $("monthSel").value;
      const store = $("storeSel").value;
      return {year, month, store};
    }

    function findPlan(year, month, store){
      const rows = PLANS?.rows || [];
      return rows.find(r => Number(r.year)===Number(year) && String(r.month)===String(month) && String(r.store)===String(store)) || null;
    }

    function rawRowsForMonth(year, monthIndex0){
      // RAW rows already have reportDateKey like "2026-02-28"
      const rows = RAW?.rows || [];
      const y = year;
      const m = String(monthIndex0+1).padStart(2,"0");
      const pref = `${y}-${m}-`;
      return rows.filter(r => String(r.reportDateKey || "").startsWith(pref));
    }

    function lastSliceDate(rows){
      // max reportDateKey in selection rows
      let max = null;
      for (const r of rows){
        const d = r.reportDateKey;
        if (!d) continue;
        if (!max || d > max) max = d;
      }
      return max; // "YYYY-MM-DD"
    }

    function buildDailyFactsByDate(rows, store){
      // rows contain all stores; pick store and sum sales (new+old - returns?) per reportDateKey
      // IMPORTANT: you mentioned "последняя версия отчета за дату" по timestamp (ts)
      // У нас в RAW уже подготовлено на стороне GAS как "last per reportDateKey+store" (судя по структуре),
      // но на всякий случай еще раз защитимся.

      const filtered = rows.filter(r => String(r.store)===String(store));

      // keep last by (store, reportDateKey)
      const mapLast = new Map();
      for (const r of filtered){
        const key = `${r.store}__${r.reportDateKey}`;
        const prev = mapLast.get(key);
        if (!prev) { mapLast.set(key, r); continue; }
        // compare ts strings (ISO). Larger => later.
        if (String(r.ts) > String(prev.ts)) mapLast.set(key, r);
      }

      const out = new Map(); // dateKey -> factSales
      for (const r of mapLast.values()){
        const sales = Number(r.salesNew||0) + Number(r.salesOld||0);
        const returns = Number(r.returns||0);
        const fact = sales - returns; // "с учетом возвратов"
        out.set(String(r.reportDateKey), fact);
      }
      return out;
    }

    function calcMonthlyTotals(rowsMonth, store){
      const filtered = rowsMonth.filter(r => String(r.store)===String(store));

      // keep last report per day (store+date) by ts
      const mapLast = new Map();
      for (const r of filtered){
        const key = `${r.store}__${r.reportDateKey}`;
        const prev = mapLast.get(key);
        if (!prev || String(r.ts) > String(prev.ts)) mapLast.set(key, r);
      }

      let salesSum = 0;
      let checksSum = 0;
      let slice = null;

      for (const r of mapLast.values()){
        const sales = Number(r.salesNew||0) + Number(r.salesOld||0);
        const returns = Number(r.returns||0);
        salesSum += (sales - returns);
        checksSum += (Number(r.checksNew||0) + Number(r.checksOld||0));
        if (!slice || String(r.reportDateKey) > slice) slice = String(r.reportDateKey);
      }

      const avgCheck = checksSum > 0 ? (salesSum / checksSum) : null;
      return { salesSum, checksSum, avgCheck, slice };
    }

    /***********************
     * Render
     ***********************/
    function render(){
      if (!META || !RAW || !PLANS) return;

      const {year, month, store} = getSelection();
      const monthIndex0 = MONTHS_RU.indexOf(month);

      // daily date list
      const dates = buildMonthDatesUTC(year, monthIndex0);
      const rowsMonth = rawRowsForMonth(year, monthIndex0);
      const factMap = buildDailyFactsByDate(rowsMonth, store);

      // plan
      const planRow = findPlan(year, month, store);
      const planMonth = planRow ? Number(planRow.planMonth||0) : 0;
      const planDay = planRow ? Number(planRow.planDay||0) : 0;

      // monthly totals
      const mt = calcMonthlyTotals(rowsMonth, store);
      const factMonth = mt.salesSum || 0;
      const pctMonth = (planMonth > 0) ? (factMonth / planMonth) : null;

      const leftToPlan = planMonth > 0 ? Math.max(0, planMonth - factMonth) : null;

      // days to end from slice date
      const sliceKey = mt.slice; // YYYY-MM-DD
      let daysToEnd = null;
      if (sliceKey){
        const sliceDt = parseISODateOnly(sliceKey);
        const endDt = new Date(Date.UTC(year, monthIndex0, dates.length));
        const diff = Math.ceil((endDt - sliceDt) / (24*3600*1000));
        daysToEnd = Math.max(0, diff);
      }

      let needPerDay = null;
      if (leftToPlan !== null && daysToEnd !== null && daysToEnd > 0) needPerDay = leftToPlan / daysToEnd;

      // subtitle
      const updated = new Date();
      $("subtitle").textContent = `Период: ${month} ${year} · Магазин: ${store} · Обновлено: ${updated.toLocaleString("ru-RU",{day:"2-digit",month:"2-digit",hour:"2-digit",minute:"2-digit"})}`;

      // cards
      const cards = [
        {k:"План (мес)", v: fmtMoney(planMonth), s:"Установленный план"},
        {k:"Факт (мес)", v: fmtMoney(factMonth), s: sliceKey ? `С учётом возвратов · Срез: ${sliceKey}` : "С учётом возвратов"},
        {k:"% от плана", v: pctMonth===null ? "—" : (pctMonth*100).toFixed(1)+"%", s:"Факт / План", pill:pctClass(pctMonth)},
        {k:"Средний чек", v: mt.avgCheck==null ? "—" : fmtMoney(mt.avgCheck), s:"Факт / Чеки"},
        {k:"Осталось до плана", v: leftToPlan==null ? "—" : fmtMoney(leftToPlan), s:"Макс(0, План − Факт)"},
        {k:"Нужно в день", v: needPerDay==null ? "—" : fmtMoney(needPerDay), s:"Чтобы закрыть план до конца месяца"},
        {k:"План на день", v: planDay ? fmtMoney(planDay) : "—", s:"Из установленных планов"},
        {k:"Дней до конца", v: daysToEnd==null ? "—" : fmtInt(daysToEnd), s:"От среза до конца месяца"},
      ];

      $("cards").innerHTML = cards.map(c=>{
        const extra = c.pill ? ` <span class="pct ${c.pill}">${c.v}</span>` : "";
        return `
          <div class="card">
            <div class="k">${c.k}</div>
            <div class="v mono">${c.pill ? extra : c.v}</div>
            <div class="s">${c.s}</div>
          </div>
        `;
      }).join("");

      // daily table
      $("dailyCut").textContent = `Срез: ${sliceKey || "—"}`;
      const tbody = $("dailyTable").querySelector("tbody");
      tbody.innerHTML = "";

      for (const dt of dates){
        const key = ymdUTC(dt);        // YYYY-MM-DD
        const fact = factMap.get(key); // may be undefined
        const plan = planDay || 0;
        const pct = (plan > 0 && fact !== undefined) ? (fact / plan) : null;

        const pctHtml = (pct===null)
          ? `<span class="pct bad">—</span>`
          : `<span class="pct ${pctClass(pct)}">${(pct*100).toFixed(1)}%</span>`;

        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td class="mono">${ddmm(dt)}</td>
          <td>${dowShort(dt)}</td>
          <td class="right mono">${plan ? fmtMoney(plan) : "—"}</td>
          <td class="right mono">${fact===undefined ? "—" : fmtMoney(fact)}</td>
          <td class="right">${pctHtml}</td>
        `;
        tbody.appendChild(tr);
      }
    }

    /***********************
     * Events
     ***********************/
    $("yearSel").addEventListener("change", render);
    $("monthSel").addEventListener("change", render);
    $("storeSel").addEventListener("change", render);

    $("refreshBtn").addEventListener("click", async ()=>{
      await loadAll();
    });

    /***********************
     * Boot
     ***********************/
    // безопасная проверка: если GAS URL не вставлен
    if (!GAS_URL || GAS_URL.includes("PASTE_YOUR_GAS_URL_HERE")){
      setStatus(false, "GAS · URL?");
      $("subtitle").textContent = "Вставь GAS URL в переменную GAS_URL в index.html";
    } else {
      loadAll();
    }
  </script>
</body>
</html>
