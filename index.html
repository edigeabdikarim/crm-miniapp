<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Планы продаж</title>

  <style>
    :root{
      --bg0:#070a14;
      --bg1:#0b1022;
      --stroke:#1e2a4a;
      --stroke2:#233156;
      --text:#e9eeff;
      --muted:#a7b2d6;
      --muted2:#7e8ab3;

      --good:#34d399;
      --warn:#fbbf24;
      --bad:#fb7185;

      --glow1: rgba(109,40,217,.18);
      --glow2: rgba(59,130,246,.18);
      --glow3: rgba(16,185,129,.12);
    }

    *{box-sizing:border-box}
    html,body{height:100%}

    /* IMPORTANT: body без скролла (анти-сворачивание Telegram WebApp) */
    body{
      margin:0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, "Noto Sans", "Helvetica Neue";
      color:var(--text);
      background:
        radial-gradient(900px 450px at 20% 10%, var(--glow2), transparent 60%),
        radial-gradient(900px 450px at 85% 18%, var(--glow1), transparent 62%),
        radial-gradient(700px 380px at 50% 92%, var(--glow3), transparent 60%),
        linear-gradient(180deg, var(--bg0), var(--bg1));
      overflow:hidden; /* ключевое */
      height:100vh;
      overscroll-behavior: none;
      -webkit-overflow-scrolling: auto;
    }

    /* Скролл делаем внутри */
    .wrap{
      max-width:1100px;
      margin:0 auto;
      padding:18px 14px calc(96px + env(safe-area-inset-bottom));
      height:calc(100vh - (78px + env(safe-area-inset-bottom)));
      overflow-y:auto;
      overflow-x:hidden;
      -webkit-overflow-scrolling:touch;
      overscroll-behavior: contain;
      touch-action: pan-y;
    }

    .top{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:12px;
      margin-bottom:14px;
    }

    h1{
      font-size:26px;
      margin:0 0 4px 0;
      letter-spacing:.2px;
    }

    .sub{
      color:var(--muted);
      font-size:13px;
      line-height:1.25;
      display:flex;
      flex-wrap:wrap;
      gap:6px;
      min-height:18px;
    }

    .pill{
      border:1px solid var(--stroke);
      background:linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.02));
      border-radius:999px;
      padding:8px 10px;
      font-size:12px;
      color:var(--muted);
      display:inline-flex;
      align-items:center;
      gap:8px;
      white-space:nowrap;
      box-shadow: 0 8px 30px rgba(0,0,0,.25);
    }
    .pill strong{color:var(--text); font-weight:700}

    .dot{
      width:8px;height:8px;border-radius:50%;
      background:var(--good);
      box-shadow:0 0 0 4px rgba(52,211,153,.14);
    }
    .dot.bad{
      background:var(--bad);
      box-shadow:0 0 0 4px rgba(251,113,133,.14);
    }
    .dot.warn{
      background:var(--warn);
      box-shadow:0 0 0 4px rgba(251,191,36,.14);
    }

    .controls{
      margin-top:12px;
      border:1px solid var(--stroke);
      background:linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.02));
      border-radius:18px;
      padding:12px;
      display:grid;
      grid-template-columns: 1fr 1fr 1fr auto;
      gap:10px;
      box-shadow:0 18px 50px rgba(0,0,0,.28);
    }

    .sel{
      width:100%;
      appearance:none;
      border:1px solid var(--stroke2);
      background:rgba(10,16,35,.6);
      color:var(--text);
      border-radius:999px;
      padding:11px 12px;
      font-size:14px;
      outline:none;
    }

    .btn{
      border:1px solid rgba(99,102,241,.35);
      background:linear-gradient(180deg, rgba(99,102,241,.35), rgba(59,130,246,.20));
      color:var(--text);
      border-radius:999px;
      padding:11px 14px;
      font-weight:700;
      cursor:pointer;
      white-space:nowrap;
    }
    .btn:active{transform:translateY(1px)}

    .grid{
      margin-top:12px;
      display:grid;
      grid-template-columns: repeat(4, 1fr);
      gap:10px;
    }

    .card{
      border:1px solid var(--stroke);
      background:linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.02));
      border-radius:18px;
      padding:14px 14px 12px;
      box-shadow:0 16px 48px rgba(0,0,0,.26);
      min-height:92px;
    }

    .k{color:var(--muted2);font-size:12px;margin-bottom:6px}
    .v{font-size:30px;font-weight:800;letter-spacing:.3px}
    .hint{margin-top:6px;color:var(--muted2);font-size:12px}
    .v.small{font-size:22px}
    .v.mono{font-variant-numeric: tabular-nums}

    .badge{
      display:inline-flex;
      align-items:center;
      gap:8px;
      border:1px solid var(--stroke2);
      padding:6px 10px;
      border-radius:999px;
      font-size:12px;
      color:var(--muted);
      background:rgba(10,16,35,.55);
    }
    .badge.good{border-color:rgba(52,211,153,.35); color:#b7ffe3}
    .badge.warn{border-color:rgba(251,191,36,.35); color:#fff1c2}
    .badge.bad{border-color:rgba(251,113,133,.35); color:#ffd2dc}

    .section{
      margin-top:18px;
    }
    .section h2{
      margin:0 0 10px 4px;
      font-size:16px;
      color:var(--text);
    }

    .tableWrap{
      border:1px solid var(--stroke);
      border-radius:18px;
      overflow:hidden;
      background:linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.015));
      box-shadow:0 18px 50px rgba(0,0,0,.30);
    }

    .scrollX{
      overflow-x:auto;
      -webkit-overflow-scrolling:touch;
    }

    table{
      width:100%;
      border-collapse:separate;
      border-spacing:0;
      min-width:620px;
    }

    thead th{
      position:sticky;
      top:0;
      z-index:2;
      background:rgba(9,14,31,.88);
      backdrop-filter: blur(10px);
      border-bottom:1px solid var(--stroke);
      color:var(--muted);
      font-size:12px;
      font-weight:700;
      padding:12px 12px;
      white-space:nowrap;
    }

    tbody td{
      padding:12px 12px;
      border-bottom:1px solid rgba(35,49,86,.45);
      font-variant-numeric: tabular-nums;
      white-space:nowrap;
    }

    tbody tr:hover td{
      background:rgba(255,255,255,.03);
    }

    .right{text-align:right}
    .center{text-align:center}
    .muted{color:var(--muted)}
    .linkish{
      border-bottom:1px solid rgba(233,238,255,.35);
      padding-bottom:1px;
    }

    .pct{
      font-weight:900;
      border-left:1px solid rgba(35,49,86,.45);
    }
    .pct.good{color:var(--good); background:linear-gradient(90deg, rgba(52,211,153,.14), rgba(52,211,153,.02))}
    .pct.warn{color:var(--warn); background:linear-gradient(90deg, rgba(251,191,36,.14), rgba(251,191,36,.02))}
    .pct.bad{color:var(--bad); background:linear-gradient(90deg, rgba(251,113,133,.14), rgba(251,113,133,.02))}

    .tabs{
      position:fixed;
      left:0; right:0; bottom:0;
      padding:10px 14px calc(16px + env(safe-area-inset-bottom));
      background:linear-gradient(180deg, rgba(7,10,20,0), rgba(7,10,20,.75) 25%, rgba(7,10,20,.95));
      backdrop-filter: blur(8px);
      z-index: 50;
    }

    .seg{
      max-width:1100px;
      margin:0 auto;
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap:10px;
    }

    .seg button{
      border:1px solid var(--stroke);
      background:rgba(10,16,35,.55);
      color:var(--muted);
      border-radius:16px;
      padding:12px 14px;
      font-weight:900;
      font-size:14px;
      cursor:pointer;
    }

    .seg button.active{
      color:var(--text);
      border-color:rgba(99,102,241,.45);
      background:linear-gradient(180deg, rgba(99,102,241,.35), rgba(59,130,246,.18));
      box-shadow:0 18px 50px rgba(59,130,246,.14);
    }

    /* Overlay “нет доступа / ошибка” */
    .overlay{
      position:fixed;
      inset:0;
      background:rgba(0,0,0,.55);
      display:none;
      align-items:center;
      justify-content:center;
      padding:18px;
      z-index: 100;
    }
    .overlay.show{display:flex}
    .modal{
      width:min(520px, 100%);
      border:1px solid var(--stroke);
      border-radius:18px;
      background:linear-gradient(180deg, rgba(255,255,255,.07), rgba(255,255,255,.02));
      box-shadow:0 24px 80px rgba(0,0,0,.45);
      padding:16px;
    }
    .modal h3{
      margin:0 0 8px 0;
      font-size:16px;
    }
    .modal p{
      margin:0 0 12px 0;
      color:var(--muted);
      font-size:13px;
      line-height:1.35;
      white-space:pre-line;
    }
    .modal .row{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }
    .modal .btn2{
      flex:1;
      border:1px solid rgba(99,102,241,.35);
      background:rgba(10,16,35,.55);
      color:var(--text);
      border-radius:14px;
      padding:12px 14px;
      font-weight:800;
      cursor:pointer;
      text-align:center;
    }
    .modal .btn2.primary{
      background:linear-gradient(180deg, rgba(99,102,241,.35), rgba(59,130,246,.20));
    }
    .mini{
      font-size:12px;
      color:var(--muted2);
      margin-top:10px;
      word-break:break-word;
    }

    @media (max-width: 820px){
      .controls{grid-template-columns:1fr 1fr}
      .controls .btn{grid-column:1 / -1}
      .grid{grid-template-columns:1fr 1fr}
      h1{font-size:22px}
      table{min-width:560px}
      tbody td, thead th{padding:10px 10px}
      .wrap{height:calc(100vh - (86px + env(safe-area-inset-bottom)));}
    }

    @media (max-width: 420px){
      .grid{grid-template-columns:1fr}
      .v{font-size:28px}
      table{min-width:520px}
    }
  </style>
</head>

<body>
  <div class="wrap" id="scrollRoot">
    <div class="top">
      <div>
        <h1>Планы продаж</h1>
        <div class="sub" id="subtitle"></div>
      </div>
      <div class="pill" id="gasPill">
        <span class="dot" id="gasDot"></span>
        <span>GAS • <strong id="gasStatus">…</strong></span>
      </div>
    </div>

    <div class="controls">
      <select id="yearSel" class="sel"></select>
      <select id="monthSel" class="sel"></select>
      <select id="storeSel" class="sel"></select>
      <button class="btn" id="refreshBtn">Обновить</button>
    </div>

    <div class="grid" id="kpiGrid"></div>

    <div class="section" id="dailySection">
      <h2>Ежедневные данные</h2>
      <div class="tableWrap">
        <div class="scrollX">
          <table>
            <thead>
              <tr>
                <th>Дата</th>
                <th class="right">% от плана</th>
                <th class="right">План</th>
                <th class="right">Факт</th>
              </tr>
            </thead>
            <tbody id="dailyBody"></tbody>
          </table>
        </div>
      </div>
    </div>

    <div class="section" id="monthlySection" style="display:none;">
      <h2>Ежемесячные данные (все магазины)</h2>

      <div style="display:flex; gap:10px; flex-wrap:wrap; align-items:center; margin:0 0 10px 4px;">
        <span class="badge"><span class="muted">Срез:</span> <strong id="cutoffText">—</strong></span>
        <span class="badge"><span class="muted">Сортировка:</span> <strong>по % выполнения</strong></span>
        <span class="badge bad">Правило %: &lt;80</span>
        <span class="badge warn">80–100</span>
        <span class="badge good">&gt;100</span>
      </div>

      <div class="tableWrap">
        <div class="scrollX">
          <table>
            <thead>
              <tr>
                <th>Магазин</th>
                <th class="right">% от плана</th>
                <th class="right">План (мес)</th>
                <th class="right">Факт (мес)</th>
                <th class="right">Средний чек</th>
              </tr>
            </thead>
            <tbody id="monthlyBody"></tbody>
          </table>
        </div>
      </div>
    </div>

    <div style="height:14px"></div>
  </div>

  <div class="tabs">
    <div class="seg">
      <button id="tabDaily" class="active">Ежедневно</button>
      <button id="tabMonthly">Ежемесячно</button>
    </div>
  </div>

  <!-- Overlay: нет доступа / ошибка -->
  <div class="overlay" id="overlayNoAccess">
    <div class="modal">
      <h3 id="noAccessTitle">🔒 Доступ ограничен</h3>
      <p id="noAccessText"></p>
      <div class="row">
        <button class="btn2 primary" id="btnRetry">Проверить снова</button>
        <button class="btn2" id="btnCloseOverlay">Закрыть</button>
      </div>
      <div class="mini" id="noAccessDebug"></div>
    </div>
  </div>

<script>
/** ====== CONFIG ====== */
const GAS_URL = "https://script.google.com/macros/s/AKfycbxbrqs_8rboE7RtNyy13OcPnZ7FKocdnVmy9iTJwP9za2_J68WORZApHJtmqX5m8qJ0/exec";
const CACHE_TTL_MS = 24 * 60 * 60 * 1000;

const MONTHS_RU = [
  "Январь","Февраль","Март","Апрель","Май","Июнь",
  "Июль","Август","Сентябрь","Октябрь","Ноябрь","Декабрь"
];

/** ====== DOM ====== */
const yearSel = document.getElementById("yearSel");
const monthSel = document.getElementById("monthSel");
const storeSel = document.getElementById("storeSel");
const refreshBtn = document.getElementById("refreshBtn");

const subtitle = document.getElementById("subtitle");
const gasStatus = document.getElementById("gasStatus");
const gasDot = document.getElementById("gasDot");

const kpiGrid = document.getElementById("kpiGrid");
const dailyBody = document.getElementById("dailyBody");
const monthlyBody = document.getElementById("monthlyBody");
const cutoffText = document.getElementById("cutoffText");

const dailySection = document.getElementById("dailySection");
const monthlySection = document.getElementById("monthlySection");
const tabDaily = document.getElementById("tabDaily");
const tabMonthly = document.getElementById("tabMonthly");

const overlayNoAccess = document.getElementById("overlayNoAccess");
const noAccessTitle = document.getElementById("noAccessTitle");
const noAccessText  = document.getElementById("noAccessText");
const noAccessDebug = document.getElementById("noAccessDebug");
const btnRetry = document.getElementById("btnRetry");
const btnCloseOverlay = document.getElementById("btnCloseOverlay");

/** ====== STATE ====== */
let META = null;
let RAW = [];
let PLANS = [];
let activeView = "daily";

/** ====== TELEGRAM ====== */
const TG = (window.Telegram && window.Telegram.WebApp) ? window.Telegram.WebApp : null;

init();

async function init(){
  wireUI();
  setupTelegram();
  await loadAll(false);
  buildSelectors();
  renderAll();
}

function setupTelegram(){
  try{
    if (!TG) return;

    // расширяем webapp и делаем более “нативным”
    TG.ready();
    TG.expand();

    // иногда помогает от дергания
    TG.disableVerticalSwipes?.();

  }catch(e){
    console.warn("TG setup error", e);
  }
}

function wireUI(){
  tabDaily.addEventListener("click", () => setView("daily"));
  tabMonthly.addEventListener("click", () => setView("monthly"));

  ["change","input"].forEach(evt=>{
    yearSel.addEventListener(evt, renderAll);
    monthSel.addEventListener(evt, renderAll);
    storeSel.addEventListener(evt, renderAll);
  });

  refreshBtn.addEventListener("click", async () => {
    await loadAll(true);
    buildSelectors(true);
    renderAll();
  });

  btnRetry.addEventListener("click", async () => {
    overlayNoAccess.classList.remove("show");
    await loadAll(true);
    buildSelectors(true);
    renderAll();
  });

  btnCloseOverlay.addEventListener("click", () => {
    overlayNoAccess.classList.remove("show");
  });
}

function setView(v){
  activeView = v;
  tabDaily.classList.toggle("active", v==="daily");
  tabMonthly.classList.toggle("active", v==="monthly");
  dailySection.style.display = v==="daily" ? "" : "none";
  monthlySection.style.display = v==="monthly" ? "" : "none";
  renderAll();
}

/** ====== DATA LOADING ====== */
async function loadAll(force){
  setGas("…", "warn");
  subtitle.innerHTML = `<span class="muted">Загрузка…</span>`;

  try{
    const [meta, raw, plans] = await Promise.all([
      fetchCached("meta", force),
      fetchCached("raw", force),
      fetchCached("plans", force),
    ]);

    META = meta;
    RAW = Array.isArray(raw?.rows) ? raw.rows : [];
    PLANS = Array.isArray(plans?.rows) ? plans.rows : [];

    setGas("OK", "good");
    overlayNoAccess.classList.remove("show");
  }catch(err){
    console.error(err);

    // Системные “ожидаемые” ошибки доступа
    if (err && err.code === "no_init_data") {
      setGas("WEB", "bad");
      showOverlay(
        "Открой Mini App из Telegram",
        "Сейчас приложение открыто не как Telegram WebApp, поэтому нет initData.\n\nОткрой мини-приложение из бота (кнопка WebApp / меню), тогда авторизация сработает.",
        `code=no_init_data\nTG=${!!TG}\nurl=${GAS_URL}`
      );
      META = { stores:[], years:[] }; RAW = []; PLANS = [];
      return;
    }

    if (err && err.code === "not_approved") {
      setGas("LOCK", "bad");
      const st = err.status || "NONE";
      const txt =
        st === "PENDING"
          ? "⏳ Твоя заявка уже отправлена и ожидает подтверждения администратора.\n\nПосле одобрения нажми «Проверить снова»."
          : "🔒 Доступ не выдан.\n\nНажми Start в боте, чтобы отправить заявку. После одобрения нажми «Проверить снова».";
      showOverlay("🔒 Доступ ограничен", txt, `code=not_approved\nstatus=${st}\nurl=${GAS_URL}`);
      META = { stores:[], years:[] }; RAW = []; PLANS = [];
      return;
    }

    // Любая другая ошибка (bad_hash, server_error, HTTP...)
    setGas("ERR", "bad");
    const msg = (err && (err.message || err.toString())) ? (err.message || err.toString()) : "unknown_error";
    showOverlay("⚠️ Ошибка загрузки", "Не удалось получить данные.\n\nНажми «Проверить снова».", `details=${msg}\nurl=${GAS_URL}`);

    META = { stores:[], years:[] };
    RAW = [];
    PLANS = [];
  }
}

function showOverlay(title, text, debug){
  noAccessTitle.textContent = title;
  noAccessText.textContent = text;
  noAccessDebug.textContent = debug || "";
  overlayNoAccess.classList.add("show");
}

function cacheKey(entity){
  return `bugatti_plans_auth_v1::${GAS_URL}::${entity}`;
}

async function fetchCached(entity, force){
  const key = cacheKey(entity);
  if (!force){
    const cached = safeJsonParse(localStorage.getItem(key));
    if (cached && cached.ts && (Date.now() - cached.ts) < CACHE_TTL_MS){
      return cached.data;
    }
  }

  const data = await fetchEntity(entity);
  localStorage.setItem(key, JSON.stringify({ ts: Date.now(), data }));
  return data;
}

async function fetchEntity(entity){
  // initData MUST come from Telegram WebApp
  const initData = (TG && TG.initData) ? TG.initData : "";
  if (!initData || String(initData).trim().length < 10){
    const e = new Error("no_init_data");
    e.code = "no_init_data";
    throw e;
  }

  const res = await fetch(GAS_URL, {
    method: "POST",
    headers: { "Content-Type":"application/json" },
    cache: "no-store",
    body: JSON.stringify({ entity, initData })
  });

  if (!res.ok){
    throw new Error(`HTTP ${res.status}`);
  }

  const json = await res.json();
  console.log("GAS response", entity, json);

  if (!json || json.ok !== true){
    const code = (json && json.error) ? String(json.error) : "bad_response";
    const err = new Error(code);
    err.code = code;

    if (code === "not_approved"){
      err.code = "not_approved";
      err.status = json.status || "NONE";
    }
    if (code === "bad_hash"){
      // Подсказка: почти всегда не тот BOT_TOKEN или открыто не из Telegram WebApp
      err.message = "bad_hash (проверь BOT_TOKEN в GAS и открытие MiniApp из Telegram)";
    }
    if (code === "server_error"){
      err.message = `server_error: ${json.details || ""}`;
    }
    throw err;
  }

  return json;
}

/** ====== UI BUILD ====== */
function setGas(text, mode){
  gasStatus.textContent = text;
  gasDot.classList.remove("good","warn","bad");
  if (mode) gasDot.classList.add(mode);
}

function buildSelectors(keepSelection=false){
  const years = (META?.years || []).slice().map(Number).filter(Boolean).sort((a,b)=>b-a);
  const stores = (META?.stores || []).slice().map(String).filter(Boolean).sort((a,b)=>a.localeCompare(b,"ru"));

  const prevYear = yearSel.value;
  const prevMonth = monthSel.value;
  const prevStore = storeSel.value;

  yearSel.innerHTML = years.map(y => `<option value="${y}">${y}</option>`).join("");
  monthSel.innerHTML = MONTHS_RU.map(m => `<option value="${escapeHtml(m)}">${escapeHtml(m)}</option>`).join("");
  storeSel.innerHTML = stores.map(s => `<option value="${escapeHtml(s)}">${escapeHtml(s)}</option>`).join("");

  if (keepSelection){
    if (prevYear && years.includes(Number(prevYear))) yearSel.value = prevYear;
    if (prevMonth && MONTHS_RU.includes(prevMonth)) monthSel.value = prevMonth;
    if (prevStore && stores.includes(prevStore)) storeSel.value = prevStore;
  } else {
    if (years.length) yearSel.value = String(years[0]);
    monthSel.value = MONTHS_RU.includes("Февраль") ? "Февраль" : (MONTHS_RU[0] || "");
    if (stores.includes("Астана")) storeSel.value = "Астана";
    else if (stores.length) storeSel.value = stores[0];
  }
}

/** ====== RENDER ====== */
function renderAll(){
  const selectedYear = Number(yearSel.value);
  const selectedMonth = String(monthSel.value).trim();
  const selectedStore = String(storeSel.value).trim();
  const monthIndex = MONTHS_RU.indexOf(selectedMonth);

  if (!selectedYear || monthIndex < 0 || !selectedStore) {
    subtitle.innerHTML = `<span class="muted">Выбери год/месяц/магазин</span>`;
    kpiGrid.innerHTML = "";
    dailyBody.innerHTML = "";
    monthlyBody.innerHTML = "";
    return;
  }

  const ymPrefix = `${selectedYear}-${String(monthIndex+1).padStart(2,"0")}-`;
  const dedup = dedupRaw(RAW);

  const storeRows = dedup.filter(r =>
    normalizeText(r.store) === normalizeText(selectedStore) &&
    String(r.reportDateKey).startsWith(ymPrefix)
  );

  const planRow = PLANS.find(p =>
    Number(p.year) === selectedYear &&
    normalizeText(p.month) === normalizeText(selectedMonth) &&
    normalizeText(p.store) === normalizeText(selectedStore)
  );

  const planMonth = planRow ? Number(planRow.planMonth || 0) : 0;
  const planDay = planRow ? Number(planRow.planDay || 0) : 0;

  const totalDaysInMonth = new Date(Date.UTC(selectedYear, monthIndex + 1, 0)).getUTCDate();

  const dailyRows = [];
  for (let day = 1; day <= totalDaysInMonth; day++){
    const dateKey = `${selectedYear}-${String(monthIndex+1).padStart(2,"0")}-${String(day).padStart(2,"0")}`;
    const factRow = storeRows.find(r => r.reportDateKey === dateKey);
    const fact = factRow ? netSales(factRow) : 0;
    const pct = planDay > 0 ? (fact / planDay) : null;

    dailyRows.push({ dateKey, plan: planDay, fact, pct });
  }

  const cutoff = maxDateKey(storeRows.map(r => r.reportDateKey));
  const cutoffLabel = cutoff || `${selectedYear}-${String(monthIndex+1).padStart(2,"0")}-01`;

  const monthFact = storeRows.reduce((sum, r) => sum + netSales(r), 0);
  const monthPct = planMonth > 0 ? (monthFact / planMonth) : null;

  const checks = storeRows.reduce((sum, r) => sum + Number(r.checksNew || 0) + Number(r.checksOld || 0), 0);
  const avgCheck = checks > 0 ? (monthFact / checks) : 0;

  const remain = Math.max(0, planMonth - monthFact);
  const cutoffDay = cutoff ? Number(cutoff.slice(8,10)) : 0;
  const daysLeft = cutoffDay ? Math.max(0, totalDaysInMonth - cutoffDay) : 0;
  const needPerDay = daysLeft > 0 ? (remain / daysLeft) : null;

  subtitle.innerHTML = [
    `<span class="muted">Период:</span> <strong>${escapeHtml(selectedMonth)} ${selectedYear}</strong>`,
    `<span class="muted">• Магазин:</span> <strong>${escapeHtml(selectedStore)}</strong>`,
    `<span class="muted">• Обновлено:</span> <strong>${timeNow()}</strong>`
  ].join(" ");

  kpiGrid.innerHTML = [
    kpiCard("План (мес)", planMonth ? money(planMonth) : "—", "Установленный план"),
    kpiCard("Факт (мес)", monthFact ? money(monthFact) : "0 ₸", `С учётом возвратов • Срез: ${cutoffLabel}`),
    kpiCard("% от плана", monthPct == null ? `<span class="badge bad">—</span>` : `<span class="badge ${pctClass(monthPct*100)}">${pctText(monthPct)}</span>`, "Факт / План", true),
    kpiCard("Средний чек", avgCheck ? money(avgCheck) : "0 ₸", "Факт / Чеки"),

    kpiCard("Осталось до плана", planMonth ? money(remain) : "—", "Макс(0, План − Факт)"),
    kpiCard("Нужно в день", needPerDay ? money(needPerDay) : "—", "Чтобы закрыть план до конца месяца"),
    kpiCard("План на день", planDay ? money(planDay) : "—", "Из установленных планов"),
    kpiCard("Дней до конца", String(daysLeft), "От среза до конца месяца")
  ].join("");

  // DAILY: дата | % | план | факт
  dailyBody.innerHTML = dailyRows.map(r => {
    const cls = r.pct == null ? "bad" : pctClass(r.pct * 100);
    return `
      <tr>
        <td><span class="linkish">${shortDate(r.dateKey)}</span></td>
        <td class="right pct ${cls}">${r.pct == null ? "—" : pctText(r.pct)}</td>
        <td class="right">${r.plan ? money(r.plan) : "—"}</td>
        <td class="right">${r.fact ? `<span class="linkish">${money(r.fact)}</span>` : "—"}</td>
      </tr>
    `;
  }).join("");

  if (activeView === "monthly"){
    const allStores = (META?.stores || []).slice().map(String).filter(Boolean);

    const monthlyRows = allStores.map(store => {
      const rows = dedup.filter(r =>
        normalizeText(r.store) === normalizeText(store) &&
        String(r.reportDateKey).startsWith(ymPrefix)
      );

      const plan = PLANS.find(p =>
        Number(p.year) === selectedYear &&
        normalizeText(p.month) === normalizeText(selectedMonth) &&
        normalizeText(p.store) === normalizeText(store)
      );

      const planMonthValue = plan ? Number(plan.planMonth || 0) : 0;
      const factValue = rows.reduce((sum, r) => sum + netSales(r), 0);
      const checksValue = rows.reduce((sum, r) => sum + Number(r.checksNew || 0) + Number(r.checksOld || 0), 0);
      const avgValue = checksValue > 0 ? (factValue / checksValue) : 0;
      const pctValue = planMonthValue > 0 ? (factValue / planMonthValue) : null;
      const cutoffValue = maxDateKey(rows.map(r => r.reportDateKey));

      return { store, planMonth: planMonthValue, fact: factValue, avgCheck: avgValue, pct: pctValue, cutoff: cutoffValue };
    });

    const globalCutoff = maxDateKey(monthlyRows.map(r => r.cutoff).filter(Boolean));
    cutoffText.textContent = globalCutoff || "—";

    monthlyRows.sort((a,b) => {
      const av = a.pct == null ? -1 : a.pct;
      const bv = b.pct == null ? -1 : b.pct;
      return bv - av;
    });

    // MONTHLY: магазин | % | план | факт | ср.чек
    monthlyBody.innerHTML = monthlyRows.map(r => {
      const cls = r.pct == null ? "bad" : pctClass(r.pct * 100);
      return `
        <tr>
          <td>${escapeHtml(r.store)}</td>
          <td class="right pct ${cls}">${r.pct == null ? "—" : pctText(r.pct)}</td>
          <td class="right">${r.planMonth ? money(r.planMonth) : "—"}</td>
          <td class="right">${r.fact ? money(r.fact) : "0 ₸"}</td>
          <td class="right">${r.avgCheck ? money(r.avgCheck) : "—"}</td>
        </tr>
      `;
    }).join("");
  }
}

/** ====== HELPERS ====== */
function dedupRaw(rows){
  const map = new Map();

  for (const r of rows){
    const store = String(r.store || "").trim();
    const dateKey = String(r.reportDateKey || "").trim();
    if (!store || !dateKey) continue;

    const key = `${normalizeText(store)}__${dateKey}`;
    const prev = map.get(key);

    const tsNew = r.ts ? Date.parse(r.ts) : 0;
    const tsPrev = prev?.ts ? Date.parse(prev.ts) : 0;

    if (!prev || tsNew >= tsPrev){
      map.set(key, r);
    }
  }
  return Array.from(map.values());
}

function netSales(r){
  const gross = Number(r.salesNew || 0) + Number(r.salesOld || 0);
  const returns = Number(r.returns || 0);
  return Math.max(0, gross - returns);
}

function maxDateKey(keys){
  if (!keys || !keys.length) return null;
  return keys.reduce((max, key) => (!max || key > max) ? key : max, null);
}

function shortDate(dateKey){
  const d = dateKey.slice(8,10);
  const m = dateKey.slice(5,7);
  return `${d}.${m}`;
}

function money(value){
  const n = Math.round(Number(value || 0));
  return `${n.toString().replace(/\B(?=(\d{3})+(?!\d))/g, " ")} ₸`;
}

function pctText(ratio){
  return `${(Number(ratio || 0) * 100).toFixed(1)}%`;
}

function pctClass(pct){
  if (!isFinite(pct)) return "bad";
  if (pct < 80) return "bad";
  if (pct <= 100) return "warn";
  return "good";
}

function kpiCard(title, valueHtml, hint, isHtml=false){
  return `
    <div class="card">
      <div class="k">${title}</div>
      ${isHtml ? `<div class="v small mono">${valueHtml}</div>` : `<div class="v mono">${valueHtml}</div>`}
      <div class="hint">${hint}</div>
    </div>
  `;
}

function timeNow(){
  const d = new Date();
  const dd = String(d.getDate()).padStart(2,"0");
  const mm = String(d.getMonth()+1).padStart(2,"0");
  const hh = String(d.getHours()).padStart(2,"0");
  const mi = String(d.getMinutes()).padStart(2,"0");
  return `${dd}.${mm}, ${hh}:${mi}`;
}

function normalizeText(s){
  return String(s || "")
    .trim()
    .toLowerCase()
    .replace(/ё/g, "е")
    .replace(/\s+/g, " ");
}

function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, c => ({
    "&":"&amp;",
    "<":"&lt;",
    ">":"&gt;",
    '"':"&quot;",
    "'":"&#39;"
  }[c]));
}

function safeJsonParse(s){
  try { return JSON.parse(s); } catch { return null; }
}
