<!doctype html>
<html>
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>CRM Dashboard MVP</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    body { font-family: system-ui, -apple-system, Arial; margin: 16px; }
    .row { display:flex; gap:10px; margin-bottom:12px; flex-wrap: wrap; }
    button { padding:10px 12px; border-radius:10px; border:1px solid #e5e7eb; background:#fff; }
    .k { font-size: 12px; opacity: .65; }
    .grid { display:grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 12px; }
    .card { border:1px solid #e5e7eb; border-radius:12px; padding:12px; }
    .v { font-size: 22px; font-weight: 700; margin-top: 6px; }
  </style>
</head>
<body>
  <h2>CRM Dashboard (MVP)</h2>

  <div class="row">
    <button onclick="load('day')">День</button>
    <button onclick="load('week')">Неделя</button>
    <button onclick="load('month')">Месяц</button>
  </div>

  <div id="status" class="k"></div>
  <div class="grid" id="grid"></div>

  <script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbz1oR97zOM8_Rwexewxuw9W9ZLob4s-xb8vAWCSMBy8q6mraxuZRaAwydpKQTA-Rtm4/exec";

    function getVal(d, key) {
      const v = d?.[key];
      return (v === undefined || v === null || v === "") ? 0 : v;
    }

    async function load(period) {
      document.getElementById('status').textContent = `Загрузка: ${period}...`;

      const res = await fetch(`${GAS_URL}?period=${period}`, { cache: "no-store" });

      // На случай, если GAS возвращает не-JSON, а текст — покажем текст ошибки
      const text = await res.text();
      let json;
      try { json = JSON.parse(text); }
      catch (e) {
        document.getElementById('status').textContent = `Ошибка: ответ не JSON. Открой GAS URL в браузере и пришли первые строки ответа.`;
        console.log("RAW RESPONSE:", text);
        return;
      }

      // Поддерживаем оба формата: {data:{...}} и просто {...}
      const d = json.data ?? json;

      document.getElementById('status').textContent = `Данные: ${period}`;

      // ⚠️ Эти названия KPI зависят от того, как именно у тебя подписаны поля в сводке/JSON
      const kpis = [
        ["Входящие", getVal(d, "Итого входящие")],
        ["Выручка", getVal(d, "Выручка")],
        ["Успешно", getVal(d, "Успешно реализовано")],
        ["Нереализовано", getVal(d, "Нереализовано")],
        ["Ожидание ответа", getVal(d, "Ожидание ответа")],
        ["Конверсия", getVal(d, "Конверсия")],
      ];

      const grid = document.getElementById('grid');
      grid.innerHTML = "";
      for (const [k, v] of kpis) {
        const el = document.createElement('div');
        el.className = "card";
        el.innerHTML = `<div class="k">${k}</div><div class="v">${v}</div>`;
        grid.appendChild(el);
      }

      if (window.Telegram?.WebApp) Telegram.WebApp.expand();
    }

    load('day');
  </script>
</body>
</html>
